<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: auto;
      min-width: 400px;
      height: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: transparent;
      padding: 0;
      margin: 0;
      color: #333;
    }

    /* 标题样式 */
    h1 {
      font-size: 16px;
      font-weight: 500;
      color: #555;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 主容器 */
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #e9ecef;
    }

    /* 表单组样式 */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 13px;
      color: #666;
    }

    .form-group input[type="text"],
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s ease;
      font-family: inherit;
    }

    .form-group input[type="text"]:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #adb5bd;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* 图标预览样式 */
    .icon-preview {
      width: 64px;
      height: 64px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fafbfc;
      overflow: hidden;
    }

    .icon-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* 按钮组样式 */
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .button-group button {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: white;
    }

    .button-group button:hover {
      background-color: #f8f9fa;
      border-color: #ced4da;
    }

    .button-group button:active {
      background-color: #e9ecef;
    }

    .btn-primary {
      background-color: #4a90d9;
      border-color: #4a90d9;
      color: rgb(32, 33, 34);
    }

    .btn-primary:hover {
      background-color: #357abd;
      border-color: #357abd;
    }

    .btn-primary:active {
      background-color: #2d6aa3;
    }

    /* 加载状态样式 */
    .loading {
      text-align: center;
      padding: 30px 20px;
      font-size: 14px;
      color: #666;
    }

    /* 通知条幅样式 */
    .toast {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background: linear-gradient(to bottom, #ffffff 0%, #f8f9fa 100%);
      border: 2px solid #ced4da;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1);
      animation: toastFadeIn 0.3s ease;
      min-width: 400px;
      max-width: 540px;
      margin: 0 auto;
    }

    .toast.success {
      border-color: #28a745;
      background: linear-gradient(to bottom, #d4edda 0%, #c3e6cb 100%);
      box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3), 0 4px 12px rgba(40, 167, 69, 0.2);
    }

    .toast.error {
      border-color: #dc3545;
      background: linear-gradient(to bottom, #f8d7da 0%, #f5c6cb 100%);
      box-shadow: 0 10px 30px rgba(220, 53, 69, 0.3), 0 4px 12px rgba(220, 53, 69, 0.2);
    }

    .toast-message {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .toast.success .toast-message {
      color: #155724;
    }

    .toast.error .toast-message {
      color: #721c24;
    }

    /* 动画效果 */
    @keyframes toastFadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastFadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    /* 主内容区域 */
    .main-content {
      display: block;
    }
    
    /* 错误信息样式 */
    .error-message {
      color: #dc3545;
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 10px;
      background-color: #f8d7da;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- 主内容 -->
  <div class="main-content">
    <div class="container">
      <div class="loading" id="loading">
        正在获取当前页面信息...
      </div>
      
      <div id="form" style="display: none;">
        <div class="form-group">
          <label for="title">网站标题</label>
          <input type="text" id="title" placeholder="输入网站标题">
        </div>
        
        <div class="form-group">
          <label for="description">网站描述</label>
          <textarea id="description" placeholder="简短描述这个网站"></textarea>
        </div>
        
        <div class="form-group">
          <label>图标预览</label>
          <div class="icon-preview" id="iconPreview">
            <img id="iconImage" src="" alt="网站图标">
          </div>
        </div>
        
        <div class="form-group">
          <label for="iconData">图标数据 (Base64)</label>
          <textarea id="iconData" placeholder="图标 base64 数据"></textarea>
        </div>
        
        <div class="button-group">
          <button class="btn-secondary" id="cancelBtn">取消</button>
          <button class="btn-primary" id="addBtn">确认添加</button>
        </div>
        
        <div class="error-message" id="error" style="display: none;"></div>
      </div>
    </div>
  </div>
  
  <!-- 通知条幅 -->
  <div class="toast" id="toast" style="display: none;">
    <div class="toast-message" id="toastMessage">添加成功！</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
