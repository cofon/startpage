<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartPage - 添加网站</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 标签页切换 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="add">添加网站</button>
    </div>

    <!-- 添加网站面板 -->
    <div id="add-panel" class="panel active">
      <h2>添加网站</h2>
      <form id="add-form">
        <div class="form-group">
          <label for="name">网站名称</label>
          <input type="text" id="name" placeholder="自定义名称（用于 Marked List 显示，可选）">
        </div>

        <div class="form-group">
          <label for="title">网页标题</label>
          <input type="text" id="title" placeholder="网页原始标题（用于搜索结果，可选）">
        </div>

        <div class="form-group">
          <label for="url">网站 URL *</label>
          <input type="url" id="url" required placeholder="https://www.google.com">
          <div id="url-exists-message" class="url-exists-message" style="display: none;">
            ⚠️ 该网站已存在，请勿重复添加
          </div>
        </div>

        <!-- 新增：SVG 图标生成区域 -->
        <div class="form-group">
          <label for="iconGenerateData">SVG 图标数据 (自动生成)</label>
          <textarea id="iconGenerateData" rows="3" placeholder="系统将自动生成 SVG 图标数据，也可手动输入..."></textarea>
          <!-- SVG 图标预览区域 -->
          <div id="svg-preview" class="icon-preview">
            <div class="icon-preview-placeholder">输入 URL 后自动生成 SVG 预览</div>
            <img id="svg-preview-img" src="" alt="SVG 图标预览" style="display: none;">
          </div>
        </div>

        <div class="form-group">
          <label for="iconData">图标数据 (iconData)</label>
          <textarea id="iconData" rows="4" placeholder="粘贴 base64 格式的图标数据，例如：data:image/png;base64,iVBOR..."></textarea>
          <!-- 图标预览区域 -->
          <div id="icon-preview" class="icon-preview">
            <div class="icon-preview-placeholder">暂无图标预览</div>
            <img id="icon-preview-img" src="" alt="图标预览" style="display: none;">
          </div>
        </div>

        <div class="form-group">
          <label for="description">描述</label>
          <textarea id="description" rows="3" placeholder="网站描述（可选）"></textarea>
        </div>

        <div class="form-group">
          <label for="tags">标签</label>
          <div class="tags-input-container">
            <input type="text" id="tags" placeholder="用逗号分隔，例如：搜索，工具">
            <div id="tags-dropdown" class="tags-dropdown">
              <!-- Tags will be dynamically added here -->
            </div>
          </div>
          <div class="form-hint">点击标签可添加或移除</div>
        </div>

        <div class="form-group">
          <label>状态设置：</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="isMarked">
              <span>标记为常用（显示在起始页）</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="isActive" checked>
              <span>激活状态（正常搜索可见）</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="isHidden">
              <span>隐藏状态（正常搜索不显示）</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-primary">保存</button>
        
        <!-- 新增：获取元数据按钮 -->
        <button type="button" id="fetch-metadata-btn" class="btn-secondary">自动获取信息</button>
      </form>
      
      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
