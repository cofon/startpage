<!--
设置面板 宽度720px, 最大高度80vh；
搜索引擎设置面板的显示修改：
1. 每一条搜索引擎显示：名字，模板(百度为例：https://www.baidu.com/s?wd={query} ),编辑按钮，删除按钮，编辑/删除按钮以图标形式显示
2. 新增搜索引擎放在最底部，点击后按钮文字从 "新增搜索引擎"修改为"确认"，新增搜索引擎的输入框在按钮上方显示，按钮还是在最底部, 输入框内的数据做个判断，如果不满足添加搜索引擎的条件，按钮为不可点击状态
3. 项目的搜索模块中，搜索引擎是以icon方式展示的，所以，添加搜索引擎需要提供icon，上传或者icon是string形式，比如：svg的string，这个我不知道该怎么做，需要你帮我设计
4. 需要一个颜色值，icon有一个圆形的边框，边框需要颜色；
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置面板-搜索引擎设置（优化列表项布局）</title>
  <style>
    /* 全局重置 + CSS变量（统一管理） */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    :root {
      /* 面板规格 */
      --panel-width: 720px;
      --panel-max-h: 80vh;
      --panel-bg: #ffffff;
      --panel-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      /* 功能色 */
      --panel-highlight: #409eff;
      --danger-color: #f56c6c;
      --text-main: #333333;
      --text-secondary: #909399;
      --text-disabled: #c0c4cc;
      --bg-hover: #f8f9fa;
      --bg-input: #f5f7fa;
      --bg-empty: #fafafa;
      /* 边框/分割线 */
      --border-light: #e4e7ed;
      --border-base: #dcdfe6;
      /* 尺寸规范 */
      --icon-preview-size: 36px;
      --icon-border-width: 2px;
      --op-icon-size: 24px; /* 缩小操作图标，更紧凑 */
      --color-block-size: 32px;
      --input-height: 36px;
      --btn-height: 40px;
      /* 圆角/间距/动画 */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-full: 50%;
      --gap-xs: 8px;
      --gap-sm: 12px;
      --gap-md: 16px;
      --gap-lg: 20px;
      --gap-xl: 32px;
      --transition: all 0.2s ease;
    }

    body {
      min-height: 100vh;
      background-color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .settings-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
      cursor: pointer;
    }

    .settings-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--panel-width);
      max-height: var(--panel-max-h);
      background: var(--panel-bg);
      border-radius: var(--radius-md);
      box-shadow: var(--panel-shadow);
      z-index: 999;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: default;
    }

    .settings-header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-header h3 {
      font-size: 18px;
      color: var(--text-main);
      font-weight: 600;
    }
    .settings-close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-full);
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .settings-close:hover {
      background: var(--border-light);
      color: var(--text-main);
    }

    .settings-content {
      flex: 1;
      padding: var(--gap-xl) 40px;
      overflow-y: auto;
    }
    .settings-content::-webkit-scrollbar {
      width: 8px;
    }
    .settings-content::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: var(--radius-sm);
    }
    .settings-content::-webkit-scrollbar-thumb:hover {
      background: var(--border-base);
    }
    .settings-content::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 通用样式 */
    .module-title {
      font-size: 16px;
      color: var(--text-main);
      font-weight: 600;
      margin-bottom: var(--gap-md);
    }
    .line-sm {
      width: 100%;
      height: 1px;
      background-color: var(--border-light);
      margin: var(--gap-md) 0 var(--gap-lg) 0;
    }
    .common-label {
      font-size: 14px;
      color: var(--text-main);
      display: inline-block;
      margin-bottom: var(--gap-xs);
      cursor: default;
    }
    .common-input {
      width: 100%;
      height: var(--input-height);
      padding: 0 14px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      outline: none;
      font-size: 14px;
      color: var(--text-main);
      transition: var(--transition);
      background-color: #fff;
    }
    .common-input::placeholder {
      color: var(--text-secondary);
    }
    .common-input:hover {
      border-color: var(--border-base);
    }
    .common-input:focus {
      border-color: var(--panel-highlight);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.2);
    }
    .color-block {
      width: var(--color-block-size);
      height: var(--color-block-size);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .color-block:hover {
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.1);
    }

    /* ---------------------- 搜索引擎设置模块（核心优化） ---------------------- */
    .search-setting {
      width: 100%;
    }

    /* 1. 搜索引擎列表区（优化布局：ICON+名称+模板+操作按钮横向紧凑排列） */
    .search-list {
      width: 100%;
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: var(--gap-lg);
    }
    .search-item {
      width: 100%;
      height: 60px; /* 降低行高，更紧凑 */
      display: flex;
      align-items: center;
      padding: 0 var(--gap-md);
      transition: var(--transition);
      border-bottom: 1px solid var(--border-light);
    }
    .search-item:last-child {
      border-bottom: none;
    }
    .search-item:hover {
      background-color: var(--bg-hover);
    }
    /* 列表项-左侧：ICON展示区（固定50px，更紧凑） */
    .search-item-icon {
      width: 50px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-show-wrap {
      width: var(--icon-preview-size);
      height: var(--icon-preview-size);
      border-radius: var(--radius-full);
      border: var(--icon-border-width) solid #409eff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #fff;
    }
    .icon-placeholder {
      font-size: 16px;
      color: var(--text-main);
      font-weight: 500;
    }
    /* 列表项-中间：名称+模板地址（弹性占比，紧凑排列） */
    .search-item-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--gap-md);
      padding: 0 var(--gap-xs);
    }
    .search-item-name {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 500;
      white-space: nowrap;
      width: 80px; /* 固定名称宽度，避免错位 */
      flex-shrink: 0;
    }
    .search-item-tpl {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    /* 列表项-右侧：编辑/删除图标按钮（紧凑排列，无固定宽度） */
    .search-item-opt {
      display: flex;
      align-items: center;
      gap: var(--gap-xs); /* 缩小按钮间距 */
      margin-left: var(--gap-sm);
    }
    .opt-icon-btn {
      width: var(--op-icon-size);
      height: var(--op-icon-size);
      border: none;
      border-radius: var(--radius-sm); /* 改为圆角矩形，更精致 */
      background-color: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      font-size: 12px; /* 缩小图标字号 */
    }
    .edit-icon {
      color: var(--panel-highlight);
    }
    .edit-icon:hover {
      background-color: rgba(64, 158, 255, 0.1);
    }
    .del-icon {
      color: var(--danger-color);
    }
    .del-icon:hover {
      background-color: rgba(239, 68, 68, 0.1);
    }

    /* 2. 新增搜索引擎输入区（保持原有布局） */
    .search-add-form {
      width: 100%;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: var(--gap-lg);
      margin-bottom: var(--gap-md);
    }
    .search-add-icon {
      display: flex;
      align-items: flex-start;
      gap: var(--gap-lg);
      margin-bottom: var(--gap-lg);
    }
    .icon-config-wrap {
      width: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap-xs);
      flex-shrink: 0;
    }
    .icon-preview {
      width: var(--icon-preview-size);
      height: var(--icon-preview-size);
      border-radius: var(--radius-full);
      border: var(--icon-border-width) solid var(--panel-highlight);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      color: var(--text-secondary);
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .icon-preview:hover {
      background-color: var(--bg-hover);
    }
    .icon-upload-btn {
      font-size: 13px;
      color: var(--panel-highlight);
      cursor: pointer;
      transition: var(--transition);
    }
    .icon-upload-btn:hover {
      color: #337ecc;
    }
    .icon-string-input {
      flex: 1;
    }
    .icon-string-input .common-input {
      background-color: var(--bg-input);
      font-size: 13px;
    }
    .search-add-info {
      display: flex;
      flex-direction: column;
      gap: var(--gap-md);
    }
    .border-color-row {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
    }
    .border-color-row .common-input {
      width: 180px;
      flex-shrink: 0;
    }

    /* 3. 底部确认按钮 */
    .search-confirm-btn {
      width: 100%;
      height: var(--btn-height);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    .search-confirm-btn:disabled {
      background-color: #f5f7fa;
      color: var(--text-disabled);
      cursor: not-allowed;
    }
    .search-confirm-btn:not(:disabled) {
      background-color: var(--panel-highlight);
      color: #ffffff;
    }
    .search-confirm-btn:not(:disabled):hover {
      background-color: #337ecc;
    }

    /* 空状态 */
    .search-empty-state {
      width: 100%;
      padding: 40px 0;
      background-color: var(--bg-empty);
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--gap-lg);
    }
    .search-empty-state i {
      font-size: 24px;
      color: var(--text-disabled);
      margin-bottom: var(--gap-xs);
      display: block;
    }
  </style>
  <!-- 阿里图标库（编辑/删除/相机图标） -->
  <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4049972_9v6z9h0s75.css">
</head>
<body>
  <!-- 遮罩层 -->
  <div class="settings-mask"></div>

  <!-- 居中设置面板 -->
  <div class="settings-panel">
    <!-- 面板头部 -->
    <div class="settings-header">
      <h3>设置</h3>
      <button class="settings-close">×</button>
    </div>

    <!-- 面板主体 -->
    <div class="settings-content">
      <!-- 搜索引擎设置模块 -->
      <div class="search-setting">
        <div class="module-title">搜索引擎设置</div>
        <div class="line-sm"></div>

        <!-- 搜索引擎列表区（优化后布局：ICON+名称+模板+操作按钮） -->
        <div class="search-list">
          <!-- 列表项1：百度（示例：ICON 百度 模板 编辑 删除） -->
          <div class="search-item">
            <div class="search-item-icon">
              <div class="icon-show-wrap" style="border-color: #2985e9;">
                <div class="icon-placeholder">百</div>
              </div>
            </div>
            <div class="search-item-info">
              <div class="search-item-name">百度</div>
              <div class="search-item-tpl">https://www.baidu.com/s?wd={query}</div>
            </div>
            <div class="search-item-opt">
              <button class="opt-icon-btn edit-icon" title="编辑"><<i class="iconfont icon-bianji"></</i></button>
              <button class="opt-icon-btn del-icon" title="删除"><<i class="iconfont icon-shanchu"></</i></button>
            </div>
          </div>
          <!-- 列表项2：谷歌 -->
          <div class="search-item">
            <div class="search-item-icon">
              <div class="icon-show-wrap" style="border-color: #4285f4;">
                <div class="icon-placeholder">谷</div>
              </div>
            </div>
            <div class="search-item-info">
              <div class="search-item-name">谷歌</div>
              <div class="search-item-tpl">https://www.google.com/search?q={query}</div>
            </div>
            <div class="search-item-opt">
              <button class="opt-icon-btn edit-icon" title="编辑"><<i class="iconfont icon-bianji"></</i></button>
              <button class="opt-icon-btn del-icon" title="删除"><<i class="iconfont icon-shanchu"></</i></button>
            </div>
          </div>
          <!-- 列表项3：必应 -->
          <div class="search-item">
            <div class="search-item-icon">
              <div class="icon-show-wrap" style="border-color: #0078d4;">
                <div class="icon-placeholder">必</div>
              </div>
            </div>
            <div class="search-item-info">
              <div class="search-item-name">必应</div>
              <div class="search-item-tpl">https://cn.bing.com/search?q={query}</div>
            </div>
            <div class="search-item-opt">
              <button class="opt-icon-btn edit-icon" title="编辑"><<i class="iconfont icon-bianji"></</i></button>
              <button class="opt-icon-btn del-icon" title="删除"><<i class="iconfont icon-shanchu"></</i></button>
            </div>
          </div>
        </div>

        <!-- 空状态（备用） -->
        <!-- <div class="search-empty-state">
          <<i class="iconfont icon-sousuo1"></</i>
          暂无搜索引擎，点击下方添加
        </div> -->

        <!-- 新增搜索引擎输入区 -->
        <div class="search-add-form">
          <div class="search-add-icon">
            <div class="icon-config-wrap">
              <div class="icon-preview"><<i class="iconfont icon-xiangji"></</i><br>预览</div>
              <div class="icon-upload-btn">上传图标</div>
            </div>
            <div class="icon-string-input">
              <label class="common-label">ICON String（SVG/地址/Base64）</label>
              <input type="text" class="common-input" placeholder="粘贴svg字符串、图片地址或base64编码">
            </div>
          </div>
          <div class="search-add-info">
            <div class="name-input">
              <label class="common-label">搜索引擎名称</label>
              <input type="text" class="common-input" placeholder="请输入名称（如：百度）">
            </div>
            <div class="tpl-input">
              <label class="common-label">搜索模板（{query}为关键词占位符）</label>
              <input type="text" class="common-input" placeholder="示例：https://www.baidu.com/s?wd={query}">
            </div>
            <div class="border-color-row">
              <label class="common-label">ICON边框色</label>
              <div class="color-block" style="background-color: #409eff;"></div>
              <input type="text" class="common-input" placeholder="请输入16进制颜色值" value="#409eff">
            </div>
          </div>
        </div>

        <!-- 底部确认按钮（默认禁用） -->
        <button class="search-confirm-btn" disabled>确认</button>
      </div>
    </div>
  </div>
</body>
</html>
