<!--
1. 设置面板顶部现在有两个内容，左侧是文字“设置”，右侧是“X”关闭按钮；
2. “设置”和“X”中间添加几个icon图标按钮：主题，搜索，模式切换的switch，添加网站，导入导出；
3. 点击这几个icon图标按钮，高亮，在设置面板下方显示对应的页面；
 4. 点击主题icon，显示主题设置页面，点击搜索icon，显示搜索设置页面，点击switch不显示页面，这个不需要页面，点击添加网站icon，显示添加网站页面；
5. 等于是把设置面板分为两个部分，上边相当于是导航栏，下方是显示区域；
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置面板-导航栏+内容区重构</title>
  <style>
    /* 全局重置 + 核心变量 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    :root {
      /* 基础色 */
      --primary: #409eff;        /* 主色 */
      --primary-light: #66b1ff;  /* 主色浅 */
      --gray-bg: #e4e7ed;        /* 灰色背景 */
      --text-main: #333;         /* 主文字 */
      --text-secondary: #909399; /* 次文字 */
      --hover-bg: #f8f9fa;       /* hover背景 */
      --border-color: #dcdfe6;   /* 边框色 */
      /* 尺寸 */
      --panel-width: 720px;      /* 面板宽度 */
      --nav-height: 60px;        /* 导航栏高度 */
      --icon-size: 24px;         /* icon尺寸 */
      --switch-width: 80px;      /* 显示模式switch宽度 */
      --switch-height: 36px;     /* switch高度 */
      /* 圆角/动画 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --full-radius: 18px;       /* switch全圆角 */
      --transition: all 0.2s ease;
    }

    body {
      min-height: 100vh;
      background-color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 设置面板容器 */
    .settings-panel {
      width: var(--panel-width);
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 顶部导航栏 */
    .settings-nav {
      height: var(--nav-height);
      padding: 0 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    /* 左侧标题 */
    .nav-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }
    /* 中间功能icon组 */
    .nav-icons {
      display: flex;
      align-items: center;
      gap: 4px; /* icon间距，小屏自适应 */
    }
    /* 功能icon按钮 */
    .nav-icon-btn {
      width: var(--switch-height); /* 和switch等高 */
      height: var(--switch-height);
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--icon-size);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: var(--transition);
    }
    /* icon hover提示 */
    .nav-icon-btn:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 12px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      z-index: 99;
    }
    /* icon激活态 */
    .nav-icon-btn.active {
      color: var(--primary);
      background: var(--hover-bg);
    }
    .nav-icon-btn:hover {
      color: var(--primary);
      background: var(--hover-bg);
    }

    /* 显示模式switch（融入icon组） */
    .mode-switch-outer {
      width: var(--switch-width);
      height: var(--switch-height);
      background: var(--gray-bg);
      border-radius: var(--full-radius);
      position: relative;
      cursor: pointer;
      margin: 0 8px;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
    }
    .mode-switch-inner {
      width: calc(var(--switch-height) - 4px);
      height: calc(var(--switch-height) - 4px);
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: var(--transition);
      box-shadow: 0 2px 6px rgba(64, 158, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }
    .mode-switch-outer.active .mode-switch-inner {
      left: calc(100% - var(--switch-height) + 2px);
    }

    /* 右侧关闭按钮 */
    .nav-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    .nav-close:hover {
      background: var(--hover-bg);
      color: var(--text-main);
    }

    /* 下方内容区 */
    .settings-content {
      flex: 1;
      padding: 24px;
      min-height: 400px; /* 最小高度，避免内容过少塌陷 */
    }
    /* 内容页面（默认隐藏） */
    .content-page {
      display: none;
      animation: fadeIn 0.2s ease;
    }
    /* 激活的页面显示 */
    .content-page.active {
      display: block;
    }
    /* 页面淡入动画 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    /* 空页面提示 */
    .empty-tip {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 16px;
    }

    /* 各页面基础样式（示例） */
    /* 主题设置页面 */
    .theme-page .theme-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .theme-page .theme-item:hover {
      background: var(--hover-bg);
    }
    .theme-page .theme-color {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }
    .theme-page .theme-item.active {
      background: var(--hover-bg);
      border: 1px solid var(--primary);
    }

    /* 搜索设置页面 */
    .search-page .setting-item {
      margin-bottom: 16px;
    }
    .search-page label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-main);
    }
    .search-page input, .search-page select {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
    }
    .search-page input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.2);
    }

    /* 添加网站页面（精简+完整切换） */
    .add-site-page .form-group {
      margin-bottom: 16px;
    }
    .add-site-page label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-main);
    }
    .add-site-page input, .add-site-page textarea, .add-site-page select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
    }
    .add-site-page input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.2);
    }
    .add-site-page .full-form-toggle {
      margin: 8px 0 16px 0;
      color: var(--primary);
      cursor: pointer;
      font-size: 13px;
    }
    .add-site-page .full-form {
      display: none;
    }
    .add-site-page .full-form.show {
      display: block;
    }
    .add-site-page .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .add-site-page .btn {
      padding: 8px 24px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
    }
    .add-site-page .btn-confirm {
      background: var(--primary);
      color: #fff;
    }
    .add-site-page .btn-confirm:hover {
      background: var(--primary-light);
    }
    .add-site-page .btn-cancel {
      background: var(--gray-bg);
      color: var(--text-main);
    }
    .add-site-page .btn-cancel:hover {
      background: #dcdfe6;
    }

    /* 响应式适配（14寸笔记本） */
    @media (max-width: 1366px) {
      .nav-icons {
        gap: 2px;
      }
      .mode-switch-outer {
        width: 70px;
      }
      .nav-icon-btn:hover::after {
        font-size: 11px;
        padding: 3px 6px;
      }
    }
  </style>
  <!-- 阿里图标库：主题/搜索/添加/网格/列表 -->
  <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4049972_9v6z9h0s75.css">
</head>
<body>
  <!-- 设置面板 -->
  <div class="settings-panel">
    <!-- 顶部导航栏 -->
    <div class="settings-nav">
      <!-- 左侧标题 -->
      <div class="nav-title">设置</div>
      
      <!-- 中间功能icon组 -->
      <div class="nav-icons">
        <!-- 主题icon -->
        <button class="nav-icon-btn" id="themeIcon" data-tip="主题设置">
          <i class="iconfont icon-zhuti"></i>
        </button>
        <!-- 搜索icon -->
        <button class="nav-icon-btn active" id="searchIcon" data-tip="搜索设置">
          <i class="iconfont icon-sousuo"></i>
        </button>
        <!-- 显示模式switch -->
        <div class="mode-switch-outer" id="displayModeSwitch" data-tip="切换显示模式">
          <div class="mode-switch-inner">网格</div>
        </div>
        <!-- 添加网站icon -->
        <button class="nav-icon-btn" id="addSiteIcon" data-tip="添加收藏网站">
          <i class="iconfont icon-tianjia"></i>
        </button>
      </div>
      
      <!-- 右侧关闭按钮 -->
      <button class="nav-close" id="closePanel">×</button>
    </div>

    <!-- 下方内容区 -->
    <div class="settings-content">
      <!-- 空提示页面（默认） -->
      <div class="content-page active" id="emptyPage">
        <div class="empty-tip">请选择上方功能进行设置</div>
      </div>

      <!-- 主题设置页面 -->
      <div class="content-page theme-page" id="themePage">
        <h3 style="margin-bottom: 20px; font-size: 16px; color: var(--text-main);">主题设置</h3>
        <div class="theme-item active">
          <div class="theme-color" style="background: #409eff;"></div>
          <span>默认蓝色主题</span>
        </div>
        <div class="theme-item">
          <div class="theme-color" style="background: #67c23a;"></div>
          <span>绿色主题</span>
        </div>
        <div class="theme-item">
          <div class="theme-color" style="background: #f56c6c;"></div>
          <span>红色主题</span>
        </div>
        <div class="theme-item">
          <div class="theme-color" style="background: #303133;"></div>
          <span>深色主题</span>
        </div>
      </div>

      <!-- 搜索设置页面 -->
      <div class="content-page search-page" id="searchPage">
        <h3 style="margin-bottom: 20px; font-size: 16px; color: var(--text-main);">搜索设置</h3>
        <div class="setting-item">
          <label for="defaultEngine">默认搜索引擎</label>
          <select id="defaultEngine">
            <option value="baidu">百度</option>
            <option value="google">谷歌</option>
            <option value="bing">必应</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="searchHotkey">搜索快捷键</label>
          <input type="text" id="searchHotkey" placeholder="例：Ctrl+K" value="Ctrl+K">
        </div>
        <div class="setting-item">
          <label for="resultCount">每页搜索结果数量</label>
          <input type="number" id="resultCount" min="10" max="50" value="20">
        </div>
      </div>

      <!-- 添加网站页面 -->
      <div class="content-page add-site-page" id="addSitePage">
        <h3 style="margin-bottom: 20px; font-size: 16px; color: var(--text-main);">添加收藏网站</h3>
        <!-- 精简表单 -->
        <div class="form-group">
          <label for="siteName">网站名称 <span style="color: #f56c6c;">*</span></label>
          <input type="text" id="siteName" placeholder="例：百度" required>
        </div>
        <div class="form-group">
          <label for="siteUrl">网站网址 <span style="color: #f56c6c;">*</span></label>
          <input type="url" id="siteUrl" placeholder="例：https://www.baidu.com" required>
        </div>
        <!-- 完整表单切换 -->
        <div class="full-form-toggle" id="toggleFullForm">▼ 展开更多设置</div>
        <!-- 完整表单（默认隐藏） -->
        <div class="full-form" id="fullForm">
          <div class="form-group">
            <label for="siteCate">网站分类</label>
            <select id="siteCate">
              <option value="all">全部</option>
              <option value="work">工作</option>
              <option value="life">生活</option>
              <option value="entertainment">娱乐</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="form-group">
            <label for="siteRemark">备注信息</label>
            <textarea id="siteRemark" rows="3" placeholder="选填：备注网站用途/账号等"></textarea>
          </div>
          <div class="form-group">
            <label for="siteIcon">网站图标</label>
            <input type="text" id="siteIcon" placeholder="粘贴图标URL / 点击上传">
          </div>
        </div>
        <!-- 按钮组 -->
        <div class="btn-group">
          <button class="btn btn-confirm" id="confirmAddSite">确认添加</button>
          <button class="btn btn-cancel" id="cancelAddSite">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. 核心变量
    const iconBtns = {
      theme: document.getElementById('themeIcon'),
      search: document.getElementById('searchIcon'),
      addSite: document.getElementById('addSiteIcon')
    };
    const contentPages = {
      empty: document.getElementById('emptyPage'),
      theme: document.getElementById('themePage'),
      search: document.getElementById('searchPage'),
      addSite: document.getElementById('addSitePage')
    };
    const displayModeSwitch = document.getElementById('displayModeSwitch');
    const toggleFullForm = document.getElementById('toggleFullForm');
    const fullForm = document.getElementById('fullForm');
    const closePanel = document.getElementById('closePanel');

    // 2. 页面切换逻辑
    function switchPage(targetIcon, targetPage) {
      // 重置所有icon激活态
      Object.values(iconBtns).forEach(icon => icon.classList.remove('active'));
      // 重置所有页面
      Object.values(contentPages).forEach(page => page.classList.remove('active'));
      
      // 激活目标icon和页面（若有）
      if (targetIcon) targetIcon.classList.add('active');
      if (targetPage) {
        targetPage.classList.add('active');
      } else {
        // 无目标页面则显示空提示（如switch）
        contentPages.empty.classList.add('active');
      }

      // 记忆最后打开的页面（localStorage）
      if (targetPage) {
        localStorage.setItem('lastSettingsPage', targetPage.id);
      }
    }

    // 3. 绑定icon点击事件
    iconBtns.theme.addEventListener('click', () => switchPage(iconBtns.theme, contentPages.theme));
    iconBtns.search.addEventListener('click', () => switchPage(iconBtns.search, contentPages.search));
    iconBtns.addSite.addEventListener('click', () => switchPage(iconBtns.addSite, contentPages.addSite));

    // 4. 显示模式switch逻辑（无页面切换）
    let isListMode = false; // 默认Grid模式
    displayModeSwitch.addEventListener('click', () => {
      displayModeSwitch.classList.toggle('active');
      isListMode = !isListMode;
      const inner = displayModeSwitch.querySelector('.mode-switch-inner');
      inner.textContent = isListMode ? '列表' : '网格';
      // 同步至数据库（示例）
      localStorage.setItem('displayMode', isListMode ? 'list' : 'grid');
    });

    // 5. 添加网站页面：完整表单切换
    toggleFullForm.addEventListener('click', () => {
      fullForm.classList.toggle('show');
      toggleFullForm.textContent = fullForm.classList.contains('show') 
        ? '▲ 收起更多设置' 
        : '▼ 展开更多设置';
    });

    // 6. 添加网站：确认/取消按钮
    document.getElementById('confirmAddSite').addEventListener('click', () => {
      const name = document.getElementById('siteName').value;
      const url = document.getElementById('siteUrl').value;
      if (!name || !url) {
        alert('请填写必填字段！');
        return;
      }
      // 模拟添加成功
      alert(`网站「${name}」添加成功！`);
      // 清空表单
      document.getElementById('siteName').value = '';
      document.getElementById('siteUrl').value = '';
      // 可选：返回搜索设置页面
      // switchPage(iconBtns.search, contentPages.search);
    });
    document.getElementById('cancelAddSite').addEventListener('click', () => {
      // 清空表单并返回空页面
      document.getElementById('siteName').value = '';
      document.getElementById('siteUrl').value = '';
      switchPage(null, contentPages.empty);
    });

    // 7. 关闭面板
    closePanel.addEventListener('click', () => {
      document.querySelector('.settings-panel').style.display = 'none';
    });

    // 8. 初始化：恢复上次打开的页面
    window.addEventListener('load', () => {
      const lastPageId = localStorage.getItem('lastSettingsPage');
      if (lastPageId) {
        const lastPage = document.getElementById(lastPageId);
        const lastIcon = lastPageId === 'themePage' ? iconBtns.theme 
          : lastPageId === 'searchPage' ? iconBtns.search 
          : iconBtns.addSite;
        switchPage(lastIcon, lastPage);
      }

      // 恢复显示模式
      const lastMode = localStorage.getItem('displayMode');
      if (lastMode === 'list') {
        displayModeSwitch.classList.add('active');
        displayModeSwitch.querySelector('.mode-switch-inner').textContent = '列表';
        isListMode = true;
      }
    });
  </script>
</body>
</html>
