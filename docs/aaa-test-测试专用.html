<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

方案1
<button style="width: 40px; height: 40px; border: none; background: transparent; padding: 0;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16" fill="currentColor"/>
    <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="white">B</text>
  </svg>
  <!-- 用span替代div，需要块级样式就加display: block -->
  <span style="display: block; color: white; text-align: center;">文字</span>
</button>

<br>


    方案2
    <!-- 优化后的完整代码：button样式归一化，内部只有svg（无div） -->
<button style="
  width: 40px;
  height: 40px;
  border: none;       /* 去掉默认边框 */
  background: none;   /* 去掉默认背景 */
  padding: 0;         /* 去掉默认内边距 */
  cursor: pointer;    /* 鼠标悬浮显示手型 */
">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16" fill="blue"/> <!-- 替换currentColor为具体颜色，避免继承问题 -->
    <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="white">B</text>
  </svg>
</button>

<br>

方案3
<div style="
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  cursor: pointer;
  user-select: none; /* 禁止文字选中，模拟button */
">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16" fill="currentColor"/>
    <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="white">B</text>
  </svg>
  <!-- 这里可以正常放div了 -->
  <div style="color: white; text-align: center;">文字</div>
</div>

    
</body>
</html>
